plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.app_ascs"
    // ✅ ACTUALIZADO: SDK 36 requerido por plugins
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // ✅ ACTUALIZADO: Java 17 para compatibilidad con AGP 8.9+
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.app_ascs"
        // ✅ minSdk debe ser al menos 24
        minSdk = 24
        // ✅ targetSdk 35 (no necesita ser 36)
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Configuración para OAuth de Google
        manifestPlaceholders += [
            'appAuthRedirectScheme': 'com.googleusercontent.apps.385400839963'
        ]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            // Optimizaciones para producción
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    // Configuración específica para Google Drive
    packagingOptions {
        resources.excludes += "META-INF/*"
    }
}

flutter {
    source = "../.."
}

dependencies {
    // ✅ ACTUALIZADO: Versiones más recientes compatibles con SDK 36
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    // ✅ ACTUALIZADO: Versión que soluciona el error de NetworkCapability
    implementation 'com.google.android.gms:play-services-auth:21.3.0'
}